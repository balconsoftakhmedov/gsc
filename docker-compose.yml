services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: seo-dashboard-app
    container_name: seo-dashboard-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
    networks:
      - seo-network

  nginx:
    image: nginx:alpine
    container_name: seo-dashboard-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - seo-network

  db:
    image: mysql:8.0
    container_name: seo-dashboard-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-seo_dashboard}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-seo_user}
    ports:
      - "3306:3306"
    volumes:
      - seo-db-data:/var/lib/mysql
    networks:
      - seo-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seo-dashboard-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - app
    networks:
      - seo-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seo-dashboard-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - app
    networks:
      - seo-network

networks:
  seo-network:
    driver: bridge

volumes:
  seo-db-data:
